<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Оформлення замовлення | GOTTI21SV</title>

<link rel="stylesheet" href="checkout.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="checkout-page">

<a href="javascript:history.back()" class="back">←</a>

<img
src="52917A0C-CBA4-4183-887A-F77A10ECA24C.png"
class="logo"
alt="GOTTI21SV">

<h1>ОФОРМЛЕННЯ ЗАМОВЛЕННЯ</h1>

<div class="product-card">

<img
id="productImage"
src=""
alt="">

<div class="product-info">

<h2 id="productName"></h2>

<p id="productPrice"></p>

</div>

</div>

<form id="checkoutForm">

<div class="section-title">
РОЗМІР
</div>

<div class="sizes">

<button type="button" class="size active">S</button>
<button type="button" class="size">M</button>
<button type="button" class="size">L</button>
<button type="button" class="size">XL</button>

</div>

<div class="section-title">
ЗВ'ЯЗОК
</div>

<div class="contact-switch">

<button type="button" class="contact-btn">
INSTAGRAM
</button>

<button type="button" class="contact-btn active">
TELEGRAM
</button>

</div>

<input
id="contact"
type="text"
class="input"
placeholder="@username">

<div class="section-title">
ДОСТАВКА
</div>

<input
id="name"
type="text"
class="input"
placeholder="Ім'я, прізвище"
required>

<input
id="city"
type="text"
class="input"
placeholder="Місто"
required>

<input
id="phone"
type="tel"
class="input"
placeholder="Номер телефону"
required>

<input
id="department"
type="text"
class="input"
placeholder="Номер відділення Нової Пошти"
required>

<textarea
id="comment"
class="textarea"
placeholder="Коментар до замовлення"></textarea>

<div class="payment-title">

ОБЕРІТЬ СПОСІБ ОПЛАТИ

</div>

<div class="payment-buttons">

<button
type="button"
class="pay-btn active"
data-type="deposit">

Передоплата 500 грн

</button>

<button
type="button"
class="pay-btn"
data-type="full">

Повна оплата

</button>

</div>

<button
type="button"
id="payButton"
class="submit">

ОПЛАТИТИ

</button>

<button
type="button"
id="sendButton"
class="submit success-button"
style="display:none;">

✅ ВІДПРАВИТИ ДАНІ ДЛЯ ВІДПРАВКИ

</button>

<p class="payment-info">

Після оплати поверніться на сайт.
Кнопка автоматично зміниться на
<b>"ВІДПРАВИТИ ДАНІ ДЛЯ ВІДПРАВКИ"</b>.

</p>

<p class="support">

Якщо виникли проблеми —
<a
href="https://t.me/gotti21svv"
target="_blank">

@gotti21svv

</a>

</p>

</form>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const product = decodeURIComponent(params.get("product") || "");
const price = decodeURIComponent(params.get("price") || "");
const image = decodeURIComponent(params.get("image") || "");

document.getElementById("productName").textContent = product;
document.getElementById("productPrice").textContent = price;
document.getElementById("productImage").src = image;

/* ---------- SIZE ---------- */

let selectedSize="S";

document.querySelectorAll(".size").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".size").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

selectedSize=btn.textContent;

};

});

/* ---------- CONTACT ---------- */

let contactType="Telegram";

document.querySelectorAll(".contact-btn").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".contact-btn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

contactType=btn.textContent;

};

});

/* ---------- PAYMENT ---------- */

let paymentType="deposit";

document.querySelectorAll(".pay-btn").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".pay-btn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

paymentType=btn.dataset.type;

};

});

const payButton=document.getElementById("payButton");
const sendButton=document.getElementById("sendButton");

payButton.onclick=()=>{

sessionStorage.setItem("paymentDone","true");

window.location.href="https://send.monobank.ua/jar/AVRkCP9whs";

};

window.addEventListener("pageshow",()=>{

if(sessionStorage.getItem("paymentDone")){

payButton.style.display="none";

sendButton.style.display="block";

sendButton.classList.add("show");

}

});
/* ---------- SEND TO TELEGRAM ---------- */

sendButton.onclick=()=>{

const text=`🛒 НОВЕ ЗАМОВЛЕННЯ

👕 Товар: ${product}

💰 Ціна: ${price}

📏 Розмір: ${selectedSize}

💳 Оплата: ${paymentType==="deposit" ? "Передоплата 500 грн" : "Повна оплата"}

👤 Ім'я: ${document.getElementById("name").value}

📱 Телефон: ${document.getElementById("phone").value}

🏙 Місто: ${document.getElementById("city").value}

📦 Нова Пошта: ${document.getElementById("department").value}

💬 ${contactType}: ${document.getElementById("contact").value}

📝 Коментар:
${document.getElementById("comment").value}`;

window.open(

window.location.href =
`https://t.me/gotti21svv?text=${encodeURIComponent(text)}`;

};

/* ---------- END ---------- */

</script>

</body>

</html>
