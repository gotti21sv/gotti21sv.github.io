<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Оформлення замовлення | GOTTI21SV</title>

<link rel="stylesheet" href="checkout.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<a href="javascript:history.back()" class="back">←</a>

<img src="52917A0C-CBA4-4183-887A-F77A10ECA24C.png" class="logo" alt="GOTTI21SV">

<h1>Оформлення замовлення</h1>

<div class="product-card">

<img id="productImage" src="" alt="">

<div class="product-info">

<h2 id="productName"></h2>

<p id="productPrice"></p>

</div>

</div>

<form id="checkoutForm">

<div class="field">

<label>Ім'я та прізвище</label>

<input
type="text"
id="name"
placeholder="Ваше ім'я"
required>

</div>

<div class="field">

<label>Номер телефону</label>

<input
type="tel"
id="phone"
placeholder="+380..."
required>

</div>

<div class="field">

<label>Telegram або Instagram</label>

<input
type="text"
id="contact"
placeholder="@username">

</div>

<div class="field">

<label>Місто</label>

<input
type="text"
id="city"
placeholder="Ваше місто"
required>

</div>

<div class="field">

<label>Відділення Нової Пошти</label>

<input
type="text"
id="department"
placeholder="№ відділення"
required>

</div>

<div class="row">

<div class="field">

<label>Розмір</label>

<select id="size">

<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>

</select>

</div>

<div class="field">

<label>Кількість</label>

<select id="quantity">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>

</select>

</div>

</div>
<div class="field">

<label>Коментар до замовлення</label>

<textarea
id="comment"
rows="4"
placeholder="За бажанням..."></textarea>

</div>

<button type="submit" class="submit">

Відправити замовлення

</button>

</form>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const product = params.get("product") || "";
const price = params.get("price") || "";
const image = params.get("image") || "";

document.getElementById("productName").textContent = product;
document.getElementById("productPrice").textContent = price;
document.getElementById("productImage").src = image;

document.getElementById("checkoutForm").addEventListener("submit",function(e){

e.preventDefault();

const order={

product,

price,

image,

name:document.getElementById("name").value,

phone:document.getElementById("phone").value,

contact:document.getElementById("contact").value,

city:document.getElementById("city").value,

department:document.getElementById("department").value,

size:document.getElementById("size").value,

quantity:document.getElementById("quantity").value,

comment:document.getElementById("comment").value

};

fetch("https://hook.eu1.make.com/iq2m2x9ampl1w8o87mr32i2xysnytuh1", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify(order)
})
.then(() => {
    fetch("https://hook.eu1.make.com/iq2m2x9ampl1w8o87mr32i2xysnytuh1", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(order)
})
.then(() => {
  sessionStorage.setItem("order", JSON.stringify(order));
  window.location.href = "payment.html";
})
.catch(err => {
  alert("Помилка відправки замовлення");
  console.error(err);
});
})
.catch(() => {
    alert("Помилка відправки замовлення. Спробуйте ще раз.");
});

});

</script>

</body>

</html>
