<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Оформлення замовлення | GOTTI21SV</title>

<link rel="stylesheet" href="checkout.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="checkout-page">

<a href="javascript:history.back()" class="back">←</a>

<img
src="52917A0C-CBA4-4183-887A-F77A10ECA24C.png"
class="logo"
alt="GOTTI21SV">

<h1>

Оформлення замовлення

</h1>

<div class="product-card">

<img
id="productImage"
src=""
alt="">

<div class="product-info">

<h2 id="productName"></h2>

<p id="productPrice"></p>

</div>

</div>

<form id="checkoutForm">

<div class="field">

<label>

Ім'я та прізвище

</label>

<input
id="name"
type="text"
placeholder="Ваше ім'я"
required>

</div>

<div class="field">

<label>

Номер телефону

</label>

<input
id="phone"
type="tel"
placeholder="+380..."
required>

</div>

<!-- CONTACT -->
<div class="field">

<label>

Telegram або Instagram

</label>

<input
id="contact"
type="text"
placeholder="@username">

</div>

<div class="field">

<label>

Місто

</label>

<input
id="city"
type="text"
placeholder="Ваше місто"
required>

</div>

<div class="field">

<label>

Відділення Нової Пошти

</label>

<input
id="department"
type="text"
placeholder="№ відділення"
required>

</div>

<div class="row">

<div class="field">

<label>

Розмір

</label>

<select id="size">

<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>

</select>

</div>

<div class="field">

<label>

Кількість

</label>

<select id="quantity">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>

</select>

</div>

</div>

<div class="field">

<label>

Коментар до замовлення

</label>

<textarea
id="comment"
rows="4"
placeholder="Коментар (необов'язково)"></textarea>

</div>

<button
type="submit"
class="submit">

Відправити замовлення

</button>

</form>
