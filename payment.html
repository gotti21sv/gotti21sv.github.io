<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Оплата замовлення | GOTTI21SV</title>

<link rel="stylesheet" href="payment.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="payment-page">

<a href="javascript:history.back()" class="back">←</a>

<img
src="52917A0C-CBA4-4183-887A-F77A10ECA24C.png"
class="logo"
alt="GOTTI21SV">

<h1>

Оплата замовлення

</h1>

<div class="card">

<h2 id="productName"></h2>

<p id="productPrice"></p>

</div>

<div class="section-title">

Оберіть спосіб оплати

</div>

<div class="payment-buttons">

<button
type="button"
class="pay-btn active"
data-type="deposit">

Передоплата 500 UAH

</button>

<button
type="button"
class="pay-btn"
data-type="full">

Повна оплата

</button>

</div>

<button
id="payNow"
class="submit">

ОПЛАТИТИ

</button>

<div
id="afterPayment"
style="display:none;">

<div class="payment-success">

<div class="success-icon">

✅

</div>

<h3>

Оплата виконана?

</h3>

<p>

Якщо ви вже оплатили замовлення,
натисніть кнопку нижче.

</p>

<button
id="sendOrder"
class="submit success">

ВІДПРАВИТИ ДАНІ ДЛЯ ВІДПРАВКИ

</button>

</div>

<div class="support">

Виникли проблеми?

<a
href="https://t.me/gotti21svv"
target="_blank">

@gotti21svv

</a>

</div>

</div>

</div>
<script>

const order = JSON.parse(sessionStorage.getItem("order"));

document.getElementById("productName").textContent = order.product;
document.getElementById("productPrice").textContent = order.price;

const priceText = order.price.replace(/[^\d]/g,"");

const fullPrice = parseInt(priceText);

document.querySelector('[data-type="full"]').textContent =
`Повна оплата ${fullPrice} UAH`;

let paymentAmount = 500;
let paymentType = "deposit";

document.querySelectorAll(".pay-btn").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".pay-btn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

if(btn.dataset.type==="deposit"){

paymentAmount=500;
paymentType="deposit";

}else{

paymentAmount=fullPrice;
paymentType="full";

}

};

});

/* ---------- PAYMENT ---------- */

const payButton=document.getElementById("payNow");

const afterPayment=document.getElementById("afterPayment");

if(sessionStorage.getItem("paid")==="true"){

payButton.style.display="none";

afterPayment.style.display="block";

}

payButton.onclick=()=>{

sessionStorage.setItem("paid","true");

window.location.href="https://send.monobank.ua/jar/AVRkCP9whs";

};
/* ---------- SEND ORDER ---------- */

document.getElementById("sendOrder").onclick=()=>{

const order = JSON.parse(sessionStorage.getItem("order"));

const payment =
paymentAmount===500
? "Передоплата 500 UAH"
: `Повна оплата ${paymentAmount} UAH`;

const text = `🛒 НОВЕ ЗАМОВЛЕННЯ

👕 Товар:
${order.product}

💰 Ціна:
${order.price}

📏 Розмір:
${order.size}

💳 Оплата:
${payment}

👤 Ім'я:
${order.name}

📱 Телефон:
${order.phone}

🏙 Місто:
${order.city}

📦 Нова Пошта:
${order.department}

💬 ${order.contactType}:
${order.contact}

📝 Коментар:
${order.comment}

✅ ОПЛАТА ПРОВЕДЕНА`;

window.location.href =
`https://t.me/gotti21svv?text=${encodeURIComponent(text)}`;

sessionStorage.removeItem("paid");

sessionStorage.removeItem("order");

};
</script>

</body>

</html>
