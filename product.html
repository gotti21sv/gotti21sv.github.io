<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOTTI21SV</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header class="product-header">

<a href="shop.html" class="back">←</a>

<img
src="52917A0C-CBA4-4183-887A-F77A10ECA24C.png"
class="logo"
alt="GOTTI21SV">

</header>

<main class="product-page">

<div class="gallery">

<img id="productImage" alt="">

</div>

<h1 id="productName"></h1>

<p id="productPrice"></p>

<div class="options">

<div class="option">

<div class="label">

Size

</div>

<div class="sizes">

<button class="size active">S</button>

<button class="size">M</button>

<button class="size">L</button>

<button class="size">XL</button>

</div>

</div>

<div class="option">

<div class="label">
Кількість
</div>

<div class="quantity">

<button id="minus">−</button>

<span id="count">1</span>

<button id="plus">+</button>

</div>

</div>

</div>

<div class="buy-wrap">

<button id="buyButton">
BUY
</button>

</div>

</main>

<div id="viewer" class="viewer">

<img id="viewerImage" alt="">

</div>

<script src="product.js"></script>

</body>
</html>
