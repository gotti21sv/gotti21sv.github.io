<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOTTI21SV</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header class="product-header">

<a href="shop.html" class="back">←</a>

<img src="IMG_2478.png" class="logo" alt="GOTTI21SV">

</header>

<main class="product-page">

<div class="gallery">

<img id="productImage" alt="Product">

</div>

<h1 id="productName"></h1>

<p id="productPrice"></p>

<div class="options">

<div class="option">

<label class="label">

Size

</label>

<select id="sizeSelect">

<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>

</select>

</div>

<div class="option">

<label class="label">

Кількість

</label>

<div class="quantity">

<button id="minus" type="button">−</button>

<span id="count">1</span>

<button id="plus" type="button">+</button>

</div>

</div>

</div>

<div class="buy-wrap">

<button id="buyButton">

BUY

</button>

</div>

</main>

<div id="viewer" class="viewer">

<img id="viewerImage" alt="Fullscreen Product">

</div>

<script src="product.js"></script>

</body>

</html>
