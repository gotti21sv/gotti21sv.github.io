<!-- Просмотр фото -->

<div class="imageModal" id="imageModal">
    <img id="modalImage" src="" alt="">
</div>

<script>

// Выбор размера

document.querySelectorAll(".sizes").forEach(group=>{

group.querySelectorAll(".size").forEach(btn=>{

btn.onclick=function(){

group.querySelectorAll(".size").forEach(b=>b.classList.remove("active"));

this.classList.add("active");

}

})

})

// Telegram

document.querySelectorAll(".buyButton").forEach(button=>{

button.onclick=function(){

const card=this.closest(".card");

const size=card.querySelector(".size.active").innerText;

const product=this.dataset.product;

const price=this.dataset.price;

const text=`Привет! 👋

Хочу заказать:

${product}

📏 Размер: ${size}

💰 Цена: ${price} грн`;

window.open(

`https://t.me/gotti21svv?text=${encodeURIComponent(text)}`,

"_blank"

);

}

})

// Просмотр фотографии

const modal=document.getElementById("imageModal");

const modalImage=document.getElementById("modalImage");

document.querySelectorAll(".card img").forEach(img=>{

img.onclick=function(){

modal.classList.add("active");

modalImage.src=this.src;

}

})

modal.onclick=function(){

modal.classList.remove("active");

}

</script>
