<script>

// Размеры

document.querySelectorAll(".sizes").forEach(group=>{

group.querySelectorAll(".size").forEach(btn=>{

btn.onclick=function(){

group.querySelectorAll(".size").forEach(x=>x.classList.remove("active"));

this.classList.add("active");

}

})

})

// Telegram

document.querySelectorAll(".buyButton").forEach(button=>{

button.onclick=function(){

const card=this.closest(".card");

const size=card.querySelector(".size.active").innerText;

const product=this.dataset.product;

const price=this.dataset.price;

const text=`Привет!

Хочу заказать:

${product}

Размер: ${size}

Цена: ${price} грн`;

window.open(

`https://t.me/gotti21svv?text=${encodeURIComponent(text)}`,

"_blank"

);

}

})

// Галерея

const viewer=document.getElementById("imageViewer");

const viewerImage=document.getElementById("viewerImage");

const prev=document.getElementById("prev");

const next=document.getElementById("next");

let images=[];

let current=0;

document.querySelectorAll(".gallery").forEach(gallery=>{

const imgs=gallery.querySelectorAll("img");

imgs.forEach((img,index)=>{

if(index!==0){

img.style.display="none";

}

img.onclick=function(){

images=[...imgs].map(x=>x.src);

current=index;

viewer.classList.add("active");

viewerImage.src=images[current];

}

})

})

prev.onclick=function(){

current--;

if(current<0){

current=images.length-1;

}

viewerImage.src=images[current];

}

next.onclick=function(){

current++;

if(current>=images.length){

current=0;

}

viewerImage.src=images[current];

}

viewer.onclick=function(e){

if(e.target===viewer){

viewer.classList.remove("active");

}

}

</script>
